<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="https://unpkg.com/graphiql@3.7.2/graphiql.min.css" />
    <style>body { margin: 0; height: 100vh; }</style>
  </head>
  <body>
    <div id="graphiql" style="height: 100vh;"></div>
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/graphiql@3.7.2/graphiql.min.js"></script>
    <script>
      const fetcher = GraphiQL.createFetcher({
        url: 'https://api.github.com/graphql',
        headers: { Authorization: 'Bearer __GITHUB_TOKEN__' },
      });
      const defaultQuery = `query {
  viewer {
    id
    login
  }
}`;
      ReactDOM.render(
        React.createElement(GraphiQL, { fetcher, defaultQuery }),
        document.getElementById('graphiql'),
      );
    </script>
  </body>
</html>
